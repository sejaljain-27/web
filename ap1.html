<!DOCTYPE html>
<html>
<head>
  <title>REST Countries API</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f2f2f2;
      margin: 0;
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    button {
      padding: 8px 15px;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      width: 320px;
      margin: 10px auto;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      text-align: left;
    }
    .img {
      display:flex;
      justify-content:center; 
      width: 100%;
      border-radius: 5px;
    }

    
  </style>
</head>
<body>

  <h2>First 5 Countries</h2>
  <button onclick="getCountries()">Load Countries</button>

  <div id="result"></div>

 <script>
async function getCountries() {
  try {
    const response = await fetch(
      "https://restcountries.com/v3.1/all?fields=name,capital,population,region,flags"
    );

    const data = await response.json();

    console.log(data); // check in console

    let output = "";

    data.slice(0, 5).forEach(country => {
      output += `
        <div class="card">
          <img src="${country.flags.png}" alt="Flag of ${country.name.common}" style="width:100%; border-radius:5px;">
          <p><strong>Name:</strong> ${country.name.common}</p>
          <p><strong>Capital:</strong> ${country.capital ? country.capital[0] : "N/A"}</p>
          <p><strong>Population:</strong> ${country.population.toLocaleString()}</p>
          <p><strong>Region:</strong> ${country.region}</p>
        </div>
      `;
    });

    document.getElementById("result").innerHTML = output;

  } catch (error) {
    console.error("Error:", error);
    document.getElementById("result").innerHTML =
      "<p style='color:red;'>Failed to load countries.</p>";
  }
}
</script>
</body>
</html>
