<!DOCTYPE html>
<html>
<head>
  <title>Random User</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #e6f2ff;
    }
    .card {
      background: white;
      width: 300px;
      margin: 20px auto;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 5px gray;
    }
    img {
      border-radius: 50%;
    }
    button {
      padding: 8px 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>Random User</h2>
<button onclick="getUser()">Generate User</button>
<div id="user"></div>

<script>
function getUser() {
  fetch("https://randomuser.me/api/")
    .then(res => res.json())
    .then(data => {
      const user = data.results[0];
      document.getElementById("user").innerHTML = `
        <div class="card">
          <img src="${user.picture.medium}">
          <p><b>Name:</b> ${user.name.first} ${user.name.last}</p>
          <p><b>Email:</b> ${user.email}</p>
          <p><b>Country:</b> ${user.location.country}</p>
        </div>
      `;
    });
}
</script>

</body>
</html>
